workflows:
  ios-testflight:
    name: iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic  # Codemagic 대시보드에서 연결
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: me.ootdai.app
      node: v20
      xcode: latest
      cocoapods: default
    scripts:
      - name: npm install
        script: npm ci

      - name: Capacitor sync iOS
        script: npx cap sync ios

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - External Testers
